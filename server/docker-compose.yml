version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: rag-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ragdb
    ports:
      - "5433:5432"  # Use 5433 on host to avoid conflict with local PostgreSQL
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  rag-api:
    build: .
    container_name: rag-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ragdb
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-llama3.2}
      CHUNK_SIZE: ${CHUNK_SIZE:-1000}
      CHUNK_OVERLAP: ${CHUNK_OVERLAP:-200}
      API_HOST: 0.0.0.0
      API_PORT: 8000
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  livekit-server:
    image: livekit/livekit-server:latest
    container_name: livekit-server
    ports:
      - "7880:7880"  # WebSocket
      - "7881:7881"  # HTTP
      - "50000-50100:50000-50100/udp"  # RTC ports
    environment:
      LIVEKIT_PORT: 7880
      LIVEKIT_BIND_ADDRESSES: 0.0.0.0
    command: --dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7880/"]
      interval: 10s
      timeout: 5s
      retries: 5

  livekit-agent:
    build: .
    container_name: livekit-agent
    depends_on:
      - livekit-server
      - rag-api
      - postgres
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ragdb
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-llama3.2}
      LIVEKIT_URL: ws://livekit-server:7880
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-devkey}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-devsecret}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    # 1.x agents CLI requires a subcommand; "start" is production mode.
    command: python -m src.livekit_agent start
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data:

