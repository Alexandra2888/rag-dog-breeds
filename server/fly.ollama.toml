# Fly.io config — Ollama inference server (LLM + embeddings).
# Deploy:  fly deploy -c fly.ollama.toml
# Uses the official Ollama image; models live on a persistent volume.
#
# After the FIRST deploy, pull the models into the volume (once):
#   fly ssh console -a dog-breed-rag-ollama -C "ollama pull nomic-embed-text"
#   fly ssh console -a dog-breed-rag-ollama -C "ollama pull llama3.1:8b"
#
# Create the volume first:
#   fly volumes create ollama_models --size 20 -a dog-breed-rag-ollama -r fra

app = "dog-breed-rag-ollama"
primary_region = "fra"

[build]
  image = "ollama/ollama:latest"

[env]
  OLLAMA_HOST = "0.0.0.0:11434"
  OLLAMA_KEEP_ALIVE = "30m"   # keep models resident between requests

[mounts]
  source = "ollama_models"
  destination = "/root/.ollama"

# Private-only service: reachable from the API/agent at
# dog-breed-rag-ollama.internal:11434 over 6PN. No public ports published.
[[services]]
  internal_port = 11434
  protocol = "tcp"

# --- Compute ---------------------------------------------------------------
# CPU-only works but an 8B model is SLOW (the answer cache hides repeats).
[[vm]]
  size = "performance-2x"
  memory = "8gb"

# For acceptable latency, use a GPU instead (needs Fly GPU access; ~$1-3/hr).
# Confirm exact sizes with `fly platform vm-sizes`, then either set here:
#   [[vm]]
#     size = "l40s"
#     memory = "16gb"
# or scale an existing machine:
#   fly scale vm l40s -a dog-breed-rag-ollama
#
# Note: .internal (6PN) has no Fly proxy, so the machine must stay running for
# the API/agent to reach it. To allow scale-to-zero with auto-start, publish a
# private Flycast service and use http://dog-breed-rag-ollama.flycast:11434.
